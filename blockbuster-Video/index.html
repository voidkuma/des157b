<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockbuster Video</title>

    <!-- Normalize CSS for browser compatability -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <!-- Meta tag for mobile support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- My Script -->
    <script src="script.js" defer></script>
    <!-- My Styles -->
    <link href="styles.css" rel="stylesheet">

</head>
<body>

    <video id="myVideo" muted autoplay loop playsinline>
        <source src="media/ducks.mp4">
        <source src="media/ducks.webm">
        <p>Your browser doesn't support HTML5 video. Here is a <a href="media/ducks.mp4">link to the video</a>
    instead.</p>

    </video>

    <section id="poem">
        <p id="line1" class="hidden">After</p>
        <p id="line2" class="hidden">every</p>
        <p id="line3" class="hidden">storm</p>
        <p id="line4" class="hidden">there's a rainbow.</p>
    </section>


    
</body>
</html>
