<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockbuster Video</title>

    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dawning+of+a+New+Day&display=swap" rel="stylesheet">

    <!-- Normalize CSS for browser compatability -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <!-- Meta tag for mobile support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

      <!-- My Styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="styles.css" rel="stylesheet">
  
    <!-- My Script -->
    <script src="script.js" defer></script>

</head>
<body>

    <div id="container">

        <header>
            <h1>Smell the Roses</h1>
            <hr>
        </header>

        <!-- Main Content -->
        <main>

            <!-- Video Section -->
            <div id="video-container">
                <video id="myVideo" muted autoplay loop playsinline>
                    <source src="media/rainbow.mp4">
                    <source src="media/rainbow.webm">
                    <p>Your browser doesn't support HTML5 video. Here is a <a href="media/rainbow.mp4">link to the video</a>
                instead.</p>

                </video>

                <!-- expand icon-->
                <i class="fas fa-expand"></i>

                <!-- loading icon -->
                 <i class="fa-solid fa-cloud-rain"></i>

                <!-- Poem Overlay -->
                <section id="poem">
                    <p id="line1" class="hidden">After</p>
                    <p id="line2" class="hidden">every</p>
                    <p id="line3" class="hidden">storm</p>
                    <p id="line4" class="hidden">there's a rainbow.</p>
                </section>

            </div>

            <!-- Duck Section -->
             <section>
                <p id="duck">(click for a duck break)</p>
                <div id="duck-container">
                    <img id="duckIMG" class="hidden" src="images/duck.jpg" alt="duckIMG">
                </div>
             </section>

        </main>


    </div>



    
</body>
</html>
